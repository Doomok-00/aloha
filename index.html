<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ALOHA VIBES - 하와이 전문 여행사</title>
    
    <!-- 라이브러리 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>

    <!-- 파이어베이스 연결 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, push, set, get, child, remove } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHC3RcbJqzcUqybUzkGBWiIEJ3-gT75zY",
            authDomain: "aloha-a334e.firebaseapp.com",
            databaseURL: "https://aloha-a334e-default-rtdb.firebaseio.com",
            projectId: "aloha-a334e",
            storageBucket: "aloha-a334e.firebasestorage.app",
            messagingSenderId: "76882503799",
            appId: "1:76882503799:web:a1d9c218dd46bee3847e72"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.saveToFirebase = async (data) => {
            const key = data.phone.replace(/-/g, "");
            const newData = { ...data, timestamp: Date.now() }; // 정렬용 타임스탬프 추가
            await set(push(ref(db, 'reservations/' + key)), newData);
        };
        window.getFromFirebase = async (phone) => {
            const key = phone.replace(/-/g, "");
            const snapshot = await get(child(ref(getDatabase()), `reservations/${key}`));
            return snapshot.exists() ? snapshot.val() : null;
        };
        window.deleteFromFirebase = async (phone, resKey) => {
            const phoneKey = phone.replace(/-/g, "");
            await remove(ref(db, `reservations/${phoneKey}/${resKey}`));
        };
        // 관리자용 전체 데이터 가져오기
        window.getAllFromFirebase = async () => {
            const snapshot = await get(ref(db, 'reservations'));
            if (snapshot.exists()) {
                const allData = snapshot.val();
                let flatList = [];
                Object.keys(allData).forEach(phoneKey => {
                    Object.keys(allData[phoneKey]).forEach(resKey => {
                        flatList.push({ ...allData[phoneKey][resKey], resKey, phoneKey });
                    });
                });
                return flatList.sort((a, b) => b.timestamp - a.timestamp); // 신청 시간순 정렬
            }
            return [];
        };
    </script>

    <style>
        /* 1. 기본 스타일 (유지) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        /* 2. 마우스 커서 (서핑보드 트레일링) */
        * { cursor: none !important; }
        .cursor-dot { width: 8px; height: 8px; background: #00d2ff; border-radius: 50%; position: fixed; z-index: 1000000; pointer-events: none; transform: translate(-50%, -50%); border: 1px solid #fff; }
        .cursor-trail { position: fixed; z-index: 999999; pointer-events: none; font-size: 28px; filter: drop-shadow(0 0 8px rgba(0,210,255,0.9)); will-change: transform; }

        html, body { height: 100%; overflow: hidden; font-family: 'Pretendard', sans-serif; background-color: #000; color: #fff; }
        .container { height: 100dvh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        section { height: 100dvh; width: 100%; scroll-snap-align: start; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; background-size: cover !important; background-position: center !important; text-align: center; padding: 0 10%; }

        #home { background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1600'); }
        #tours { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=1600'); }
        #booking { background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1505118380757-91f5f5632de0?w=1600'); }
        #check { background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1503756234508-e32369269deb?w=1600'); }
        #contact { background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1505881502353-a1986add3732?w=1600'); }
        #admin { background-image: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1454165833767-027eeea15c3e?w=1600'); }

        .indicator { position: fixed; left: 25px; top: 50%; transform: translateY(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 15px; }
        .dot { width: 10px; height: 10px; border: 1px solid #fff; background: rgba(255,255,255,0.2); transition: 0.3s; }
        .dot.active { background: #00d2ff; border-color: #00d2ff; transform: scale(1.3); }

        .menu-toggle { position: fixed; top: 25px; right: 25px; z-index: 1001; width: 50px; height: 50px; background: #00d2ff; color: white; border: none; font-size: 30px; border-radius: 8px; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.4s; }
        .menu-overlay.open { opacity: 1; visibility: visible; }
        .menu-link { font-size: 2.2rem; font-weight: 800; color: #fff; text-decoration: none; letter-spacing: 5px; margin: 12px 0; }

        .form-card { background: white; color: #333; padding: 25px; border-radius: 20px; width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .form-card input, .form-card select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 100%; font-size: 16px; }
        .action-btn { background: #00d2ff; border: none; padding: 15px 30px; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* 관리자 테이블 스타일 */
        .admin-box { width: 100%; max-width: 1100px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; text-align: left; }
        .admin-table { width: 100%; border-collapse: collapse; color: #fff; font-size: 13px; margin-top: 15px; }
        .admin-table th { background: #00d2ff; color: #000; padding: 10px; text-align: left; }
        .admin-table td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .pagination { display: flex; justify-content: center; gap: 10px; margin-top: 20px; }
        .page-btn { background: #333; color: white; border: none; padding: 5px 12px; border-radius: 4px; cursor: pointer; }
        .page-btn.active { background: #00d2ff; color: #000; font-weight: bold; }

        #resultArea { margin-top: 15px; width: 100%; max-height: 250px; overflow-y: auto; text-align: left; display: none; }
        .res-item { background: #f0faff; padding: 15px; border-radius: 12px; border-left: 5px solid #00d2ff; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .tour-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 850px; margin-bottom: 25px; }
        .tour-card { background: rgba(255,255,255,0.12); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); }
        .map-box { width: 100%; height: 420px; border-radius: 20px; overflow: hidden; border: 2px solid #00d2ff; }
        @media (max-width: 768px) { .tour-container { grid-template-columns: 1fr; } h1 { font-size: 2.5rem !important; } .menu-link { font-size: 1.8rem; } }
    </style>
</head>
<body>

    <!-- 마우스 커서 -->
    <div class="cursor-dot"></div>
    <div class="cursor-trail">🏄‍♂️</div>

    <button class="menu-toggle" onclick="toggleMenu()">≡</button>
    <div class="menu-overlay" id="menuOverlay">
        <a href="javascript:void(0)" class="menu-link" onclick="goToSection(0)">HOME</a>
        <a href="javascript:void(0)" class="menu-link" onclick="goToSection(1)">TOURS</a>
        <a href="javascript:void(0)" class="menu-link" onclick="goToSection(2)">BOOKING</a>
        <a href="javascript:void(0)" class="menu-link" onclick="goToSection(3)">CHECK</a>
        <a href="javascript:void(0)" class="menu-link" onclick="goToSection(4)">LOCATION</a>
        <a href="javascript:void(0)" class="menu-link" onclick="goToSection(5)" style="color:#00d2ff;">ADMIN</a>
    </div>

    <div class="indicator">
        <div class="dot active" onclick="goToSection(0)"></div>
        <div class="dot" onclick="goToSection(1)"></div>
        <div class="dot" onclick="goToSection(2)"></div>
        <div class="dot" onclick="goToSection(3)"></div>
        <div class="dot" onclick="goToSection(4)"></div>
        <div class="dot" onclick="goToSection(5)"></div>
    </div>

    <div class="container" id="mainContainer">
        <!-- 1. HOME -->
        <section id="home"><h1>ALOHA VIBES</h1><p style="color: #00d2ff;">완벽한 하와이 어드벤처</p></section>
        
        <!-- 2. TOURS -->
        <section id="tours">
            <h2 style="margin-bottom: 30px;">Premium Tours</h2>
            <div class="tour-container">
                <div class="tour-card"><h3>오아후 섬 투어</h3><p>$149</p></div>
                <div class="tour-card"><h3>헬기 투어</h3><p>$320</p></div>
                <div class="tour-card"><h3>스노클링</h3><p>$85</p></div>
                <div class="tour-card"><h3>스카이다이빙 🪂</h3><p>$250</p></div>
            </div>
            <button class="action-btn" style="padding: 18px 60px;" onclick="goToSection(2)">예약하러 가기</button>
        </section>

        <!-- 3. BOOKING -->
        <section id="booking">
            <h2 style="margin-bottom: 20px;">Booking Request</h2>
            <form action="https://formspree.io/f/xojpdaqq" method="POST" class="form-card" id="resForm">
                <input type="text" name="name" id="book_name" placeholder="성함" required>
                <input type="tel" name="phone" id="book_phone" placeholder="연락처 (010-0000-0000)" maxlength="13" required>
                <input type="email" name="email" id="book_email" placeholder="이메일" required>
                <input type="text" id="rangeDate" name="dates" placeholder="일정 선택" readonly required>
                <select name="product" id="book_product" required>
                    <option value="">상품 선택</option>
                    <option>오아후 섬 일주</option><option>섬 전체 헬기 투어</option>
                    <option>하나우마베이 스노클링</option><option>하와이 스카이다이빙</option>
                </select>
                <div style="display:flex; gap:10px;">
                    <select name="adults" id="book_adults" required>
                        <option value="1">성인 1명</option><option value="2">성인 2명</option><option value="3">성인 3명</option><option value="4">성인 4명</option>
                    </select>
                    <select name="children" id="book_children">
                        <option value="0">어린이 0명</option><option value="1">어린이 1명</option><option value="2">어린이 2명</option>
                    </select>
                </div>
                <button type="submit" class="action-btn" id="submitBtn">예약 신청 완료</button>
            </form>
        </section>

        <!-- 4. CHECK -->
        <section id="check">
            <h2 style="margin-bottom: 20px;">Check Reservation</h2>
            <div class="form-card">
                <input type="tel" id="check_phone" placeholder="연락처를 입력하세요" maxlength="13">
                <button type="button" class="action-btn" onclick="handleLookup()">내역 조회하기</button>
                <div id="resultArea"></div>
            </div>
        </section>

        <!-- 5. LOCATION -->
        <section id="contact">
            <div class="map-box"><iframe src="https://www.google.com/maps?q=Waikiki+Beach+Honolulu+HI&output=embed" width="100%" height="100%" style="border:0;"></iframe></div>
            <p style="margin-top:10px; font-size:14px; color:rgba(255,255,255,0.7);">📍 2335 Kalākaua Ave, Honolulu, HI 96815</p>
        </section>

        <!-- 6. ADMIN (New) -->
        <section id="admin">
            <div id="adminAuth" class="form-card">
                <h3>Admin Access</h3>
                <input type="password" id="adminPassword" placeholder="관리자 비밀번호">
                <button class="action-btn" onclick="loginAdmin()">접속하기</button>
            </div>
            
            <div id="adminPanel" class="admin-box" style="display:none;">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <h2>전체 예약 현황</h2>
                    <div>
                        <select id="rowsPerPage" onchange="changePageSize()" style="padding:5px; border-radius:4px;">
                            <option value="10">10줄 보기</option>
                            <option value="30">30줄 보기</option>
                            <option value="50">50줄 보기</option>
                        </select>
                        <button onclick="loadAdminData()" style="padding:5px 10px; cursor:pointer;">새로고침</button>
                    </div>
                </div>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>신청시간</th><th>성함</th><th>연락처</th><th>상품</th><th>일정</th><th>인원</th>
                        </tr>
                    </thead>
                    <tbody id="adminTbody"></tbody>
                </table>
                <div id="adminPagination" class="pagination"></div>
            </div>
        </section>
    </div>

    <script>
        // --- 1. 마우스 효과 ---
        const dot = document.querySelector('.cursor-dot');
        const trail = document.querySelector('.cursor-trail');
        let mx = 0, my = 0, tx = 0, ty = 0;
        window.addEventListener('mousemove', e => { 
            mx = e.clientX; my = e.clientY; 
            dot.style.transform = `translate3d(${mx}px, ${my}px, 0) translate(-50%, -50%)`;
        });
        function animate() {
            tx += (mx - tx) * 0.1; ty += (my - ty) * 0.1;
            trail.style.transform = `translate3d(${tx + 15}px, ${ty + 15}px, 0)`;
            requestAnimationFrame(animate);
        }
        animate();

        // --- 2. 기본 입력 제어 ---
        const phoneAutoHyphen = (e) => {
            let v = e.target.value.replace(/[^0-9]/g, ""), r = "";
            if (v.length < 4) r = v;
            else if (v.length < 8) r = v.substr(0, 3) + "-" + v.substr(3);
            else r = v.substr(0, 3) + "-" + v.substr(3, 4) + "-" + v.substr(7);
            e.target.value = r;
        };
        document.getElementById('book_phone').addEventListener('input', phoneAutoHyphen);
        document.getElementById('check_phone').addEventListener('input', phoneAutoHyphen);

        flatpickr("#rangeDate", { mode: "range", locale: "ko", dateFormat: "y.m.d", minDate: "today" });

        // --- 3. 예약 및 개인 조회 ---
        document.getElementById('resForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const data = { 
                name: document.getElementById('book_name').value, phone: document.getElementById('book_phone').value, 
                email: document.getElementById('book_email').value, dates: document.getElementById('rangeDate').value, 
                product: document.getElementById('book_product').value, adults: document.getElementById('book_adults').value, 
                children: document.getElementById('book_children').value, time: new Date().toLocaleString() 
            };
            btn.innerText = "전송 중...";
            try {
                const res = await fetch(this.action, { method: 'POST', body: new FormData(this), headers: { 'Accept': 'application/json' } });
                if (res.ok) { await window.saveToFirebase(data); alert("예약 신청이 완료되었습니다."); this.reset(); }
            } catch (err) { alert("오류 발생"); }
            btn.innerText = "예약 신청 완료";
        });

        async function handleLookup() {
            const phone = document.getElementById('check_phone').value;
            const area = document.getElementById('resultArea');
            if (!phone) return;
            area.innerHTML = "조회 중..."; area.style.display = "block";
            const data = await window.getFromFirebase(phone);
            if (data) {
                area.innerHTML = "";
                Object.values(data).reverse().forEach(r => {
                    const item = document.createElement('div');
                    item.className = 'res-item';
                    item.innerHTML = `<div><b>${r.product}</b><p style="font-size:12px;">${r.dates}</p></div>`;
                    area.appendChild(item);
                });
            } else { area.innerHTML = "내역이 없습니다."; }
        }

        // --- 4. 관리자 전용 로직 ---
        let adminData = [];
        let curPage = 1;
        let rowsPerPage = 10;

        function loginAdmin() {
            if (document.getElementById('adminPassword').value === "aloha1234") { // 비번 설정
                document.getElementById('adminAuth').style.display = "none";
                document.getElementById('adminPanel').style.display = "block";
                loadAdminData();
            } else { alert("비밀번호가 틀렸습니다."); }
        }

        async function loadAdminData() {
            adminData = await window.getAllFromFirebase();
            renderAdminTable();
        }

        function changePageSize() {
            rowsPerPage = parseInt(document.getElementById('rowsPerPage').value);
            curPage = 1;
            renderAdminTable();
        }

        function renderAdminTable() {
            const tbody = document.getElementById('adminTbody');
            tbody.innerHTML = "";
            if(adminData.length === 0) {
                tbody.innerHTML = "<tr><td colspan='6' style='text-align:center; padding:30px;'>예약 내역이 없습니다.</td></tr>";
                return;
            }
            const start = (curPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            const paginated = adminData.slice(start, end);

            paginated.forEach(r => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${r.time}</td><td>${r.name}</td><td>${r.phone}</td><td>${r.product}</td><td>${r.dates}</td><td>성인${r.adults}/아동${r.children}</td>`;
                tbody.appendChild(tr);
            });
            renderPagination();
        }

        function renderPagination() {
            const pBox = document.getElementById('adminPagination');
            pBox.innerHTML = "";
            const totalPages = Math.ceil(adminData.length / rowsPerPage);
            for (let i = 1; i <= totalPages; i++) {
                const b = document.createElement('button');
                b.className = `page-btn ${i === curPage ? 'active' : ''}`;
                b.innerText = i;
                b.onclick = () => { curPage = i; renderAdminTable(); };
                pBox.appendChild(b);
            }
        }

        // --- 5. 메뉴 및 스크롤 제어 ---
        function toggleMenu() { document.getElementById('menuOverlay').classList.toggle('open'); }
        function goToSection(i) { 
            document.querySelectorAll('section')[i].scrollIntoView({ behavior: 'smooth' }); 
            if(document.getElementById('menuOverlay').classList.contains('open')) toggleMenu(); 
        }
        document.getElementById('mainContainer').addEventListener('scroll', () => {
            let cur = 0;
            const sections = document.querySelectorAll('section');
            const container = document.getElementById('mainContainer');
            sections.forEach((s, i) => { if (container.scrollTop >= s.offsetTop - 50) cur = i; });
            document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === cur));
        });
    </script>
</body>
</html>
