    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, push, set, get, child, remove, update } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHC3RcbJqzcUqybUzkGBWiIEJ3-gT75zY",
            authDomain: "aloha-a334e.firebaseapp.com",
            databaseURL: "https://aloha-a334e-default-rtdb.firebaseio.com",
            projectId: "aloha-a334e",
            storageBucket: "aloha-a334e.firebasestorage.app",
            messagingSenderId: "76882503799",
            appId: "1:76882503799:web:a1d9c218dd46bee3847e72"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.saveToFirebase = async (data) => {
            const key = data.phone.replace(/-/g, "");
            const newData = { ...data, timestamp: Date.now() };
            await set(push(ref(db, 'reservations/' + key)), newData);
        };
        window.getFromFirebase = async (phone) => {
            const key = phone.replace(/-/g, "");
            const snapshot = await get(child(ref(db), `reservations/${key}`));
            return snapshot.exists() ? snapshot.val() : null;
        };
        window.getAllFromFirebase = async () => {
            const snapshot = await get(ref(db, 'reservations'));
            if (snapshot.exists()) {
                const allData = snapshot.val();
                let flatList = [];
                Object.keys(allData).forEach(phoneKey => {
                    Object.keys(allData[phoneKey]).forEach(resKey => {
                        flatList.push({ ...allData[phoneKey][resKey], resKey, phoneKey });
                    });
                });
                // 1. 시간 순서대로 정렬 (오래된 순 [0] ... 최신 순 [끝])
                return flatList.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
            }
            return [];
        };
        window.updateFirebase = async (phoneKey, resKey, updatedData) => {
            await update(ref(db, `reservations/${phoneKey}/${resKey}`), updatedData);
        };
        window.deleteFromFirebase = async (phone, resKey) => {
            const phoneKey = phone.replace(/-/g, "");
            await remove(ref(db, `reservations/${phoneKey}/${resKey}`));
        };
    </script>

        .map-box { width: 100%; height: 420px; border-radius: 20px; overflow: hidden; border: 2px solid #00d2ff; }
    </style>

    <script>
        function createRipple(x, y) {
            const ripple = document.createElement('div'); ripple.className = 'touch-ripple'; document.body.appendChild(ripple);
            const size = 40; ripple.style.width = ripple.style.height = size + 'px';
            ripple.style.left = (x - size/2) + 'px'; ripple.style.top = (y - size/2) + 'px';
            ripple.addEventListener('animationend', () => ripple.remove());
        }
        window.addEventListener('touchstart', (e) => createRipple(e.touches[0].clientX, e.touches[0].clientY));

        const dot = document.querySelector('.cursor-dot');
        const trail = document.querySelector('.cursor-trail');
        let mx = 0, my = 0, tx = 0, ty = 0;
        window.addEventListener('mousemove', e => { mx = e.clientX; my = e.clientY; dot.style.left = mx+'px'; dot.style.top = my+'px'; });
        function animate() { tx += (mx - tx) * 0.1; ty += (my - ty) * 0.1; trail.style.transform = `translate3d(${tx + 15}px, ${ty + 15}px, 0)`; requestAnimationFrame(animate); }
        animate();

        const autoHyphen = (e) => {
            let v = e.target.value.replace(/[^0-9]/g, ""), r = "";
            if (v.length < 4) r = v; else if (v.length < 8) r = v.substr(0, 3) + "-" + v.substr(3); else r = v.substr(0, 3) + "-" + v.substr(3, 4) + "-" + v.substr(7);
            e.target.value = r;
        };
        document.getElementById('book_phone').addEventListener('input', autoHyphen);
        document.getElementById('check_phone').addEventListener('input', autoHyphen);
        flatpickr("#rangeDate", { mode: "range", locale: "ko", dateFormat: "y.m.d", minDate: "today" });

        document.getElementById('resForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const data = { 
                name: document.getElementById('book_name').value.trim(), phone: document.getElementById('book_phone').value, 
                email: document.getElementById('book_email').value, dates: document.getElementById('rangeDate').value, 
                product: document.getElementById('book_product').value, adults: document.getElementById('book_adults').value, 
                children: document.getElementById('book_children').value, time: new Date().toLocaleString() 
            };
            btn.innerText = "전송 중...";
            try {
                const res = await fetch(this.action, { method: 'POST', body: new FormData(this), headers: { 'Accept': 'application/json' } });
                if (res.ok) { await window.saveToFirebase(data); alert("예약 신청이 완료되었습니다."); this.reset(); }
                else { alert("전송 실패"); }
            } catch (err) { alert("오류 발생"); }
            btn.innerText = "예약 신청 완료";
        });

        async function handleLookup() {
            const name = document.getElementById('check_name').value.trim();
            const phone = document.getElementById('check_phone').value;
            const area = document.getElementById('resultArea');
            if (!name || !phone) return;
            area.innerHTML = "조회 중..."; area.style.display = "block";
            const data = await window.getFromFirebase(phone);
            if (data) {
                const myRes = Object.values(data).filter(r => r.name === name);
                if (myRes.length > 0) {
                    area.innerHTML = `<h4 style='color:#007fa3; margin-bottom:10px;'>총 ${myRes.length}건</h4>`;
                    myRes.reverse().forEach(r => {
                        const item = document.createElement('div'); item.className = 'res-item';
                        const resKey = Object.keys(data).find(k => data[k] === r);
                        item.innerHTML = `<div style="flex:1;"><b>📦 ${r.product}</b><p style="font-size:13px;">📅 ${r.dates}</p></div><button class="cancel-btn" onclick="handleCancel('${phone}', '${resKey}', '${r.name}', '${r.product}')">취소</button>`;
                        area.appendChild(item);
                    });
                } else { alert("이름 불일치"); area.style.display="none"; }
            } else { alert("내역 없음"); area.style.display="none"; }
        }

        async function handleCancel(phone, resKey, name, product) {
            if (!confirm("취소하시겠습니까?")) return;
            const cancelData = new FormData();
            cancelData.append("알림", "⚠️ 예약 취소"); cancelData.append("고객", name); cancelData.append("연락처", phone);
            try {
                await fetch("https://formspree.io/f/xojpdaqq", { method: 'POST', body: cancelData, headers: { 'Accept': 'application/json' } });
                await window.deleteFromFirebase(phone, resKey); alert("취소되었습니다."); handleLookup();
            } catch (err) { alert("오류"); }
        }

        let adminData = []; let filteredData = []; let curPage = 1; let rowsPerPage = 10; let editResKey = null;
        function loginAdmin() {
            if (document.getElementById('adminPassword').value === "aloha1234") {
                document.getElementById('adminAuth').style.display = "none";
                document.getElementById('adminPanel').style.display = "block";
                loadAdminData();
            } else { alert("비밀번호 오류"); }
        }
        async function loadAdminData() { adminData = await window.getAllFromFirebase(); filteredData = [...adminData]; renderAdminTable(); }
        function handleAdminSearch() {
            const q = document.getElementById('adminSearch').value.toLowerCase();
            filteredData = adminData.filter(r => (r.name && r.name.toLowerCase().includes(q)) || (r.phone && r.phone.includes(q)));
            curPage = 1; renderAdminTable();
        }
        function changePageSize() { rowsPerPage = parseInt(document.getElementById('rowsPerPage').value); curPage = 1; renderAdminTable(); }
        
        function renderAdminTable() {
            const tbody = document.getElementById('adminTbody'); tbody.innerHTML = "";
            if(filteredData.length === 0) { tbody.innerHTML = "<tr><td colspan='10' style='text-align:center; padding:30px;'>데이터가 없습니다.</td></tr>"; return; }
            
            // 1. 페이징 범위 계산
            const start = (curPage - 1) * rowsPerPage;
            const end = start + rowsPerPage;
            
            // 2. 현재 페이지에 보여줄 데이터만 추출 (신청 순서대로 들어있는 filteredData에서 추출)
            const paginated = filteredData.slice(start, end);

            // 3. 최신이 위로 오도록 배열을 뒤집어 렌더링 (단, 번호는 원래 순서 보존)
            [...paginated].reverse().forEach((r) => {
                const tr = document.createElement('tr');
                // No.는 전체 목록에서의 원래 순서 (오래된 것이 1번)
                const originalIdx = filteredData.indexOf(r);
                const no = originalIdx + 1;

                if (editResKey === r.resKey) {
                    tr.innerHTML = `<td>${no}</td><td>${r.time || ''}</td><td><input type="text" id="edit_name" value="${r.name || ''}"></td><td><input type="text" id="edit_phone" value="${r.phone || ''}"></td><td><input type="text" id="edit_email" value="${r.email || ''}"></td><td><input type="text" id="edit_product" value="${r.product || ''}"></td><td><input type="text" id="edit_dates" value="${r.dates || ''}"></td><td><input type="text" id="edit_adults" value="${r.adults || ''}"></td><td><input type="text" id="edit_children" value="${r.children || ''}"></td><td><button class="admin-btn btn-save" onclick="saveEdit('${r.phoneKey}', '${r.resKey}')">저장</button><button class="admin-btn" onclick="cancelEdit()">취소</button></td>`;
                } else {
                    tr.innerHTML = `<td>${no}</td><td>${r.time || ''}</td><td>${r.name || ''}</td><td>${r.phone || ''}</td><td>${r.email || ''}</td><td>${r.product || ''}</td><td>${r.dates || ''}</td><td>${r.adults || 0}</td><td>${r.children || 0}</td><td><button class="admin-btn btn-edit" onclick="startEdit('${r.resKey}')">수정</button><button class="admin-btn btn-del" onclick="deleteItem('${r.phoneKey}', '${r.resKey}')">삭제</button></td>`;
                }
                tbody.appendChild(tr);
            });
            renderPagination();
        }

        function renderPagination() {
            const pBox = document.getElementById('adminPagination'); pBox.innerHTML = "";
            const totalPages = Math.ceil(filteredData.length / rowsPerPage);
            for (let i = 1; i <= totalPages; i++) {
                const b = document.createElement('button'); b.className = `page-btn ${i === curPage ? 'active' : ''}`;
                b.innerText = i; b.onclick = () => { curPage = i; renderAdminTable(); }; pBox.appendChild(b);
            }
        }
        function startEdit(rKey) { editResKey = rKey; renderAdminTable(); }
        function cancelEdit() { editResKey = null; renderAdminTable(); }
        async function saveEdit(pKey, rKey) {
            const updated = { name: document.getElementById('edit_name').value, phone: document.getElementById('edit_phone').value, email: document.getElementById('edit_email').value, product: document.getElementById('edit_product').value, dates: document.getElementById('edit_dates').value, adults: document.getElementById('edit_adults').value, children: document.getElementById('edit_children').value };
            await window.updateFirebase(pKey, rKey, updated); alert("수정 완료"); editResKey = null; loadAdminData();
        }
        async function deleteItem(pKey, rKey) { if (confirm("정말 삭제하시겠습니까?")) { await window.deleteFromFirebase(pKey.replace(/-/g,""), rKey); alert("삭제되었습니다."); loadAdminData(); } }

        function toggleMenu() { document.getElementById('menuOverlay').classList.toggle('open'); }
        function goToSection(i) { document.querySelectorAll('section')[i].scrollIntoView({ behavior: 'smooth' }); if(document.getElementById('menuOverlay').classList.contains('open')) toggleMenu(); }
        document.getElementById('mainContainer').addEventListener('scroll', () => {
            let cur = 0; const sections = document.querySelectorAll('section'); const container = document.getElementById('mainContainer');
            sections.forEach((s, i) => { if (container.scrollTop >= s.offsetTop - 50) cur = i; });
            document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === cur));
        });
    </script>
</body>
</html>
