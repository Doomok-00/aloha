<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ALOHA VIBES - 관리자 모드 고도화</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>

    <!-- 파이어베이스 연결 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, push, set, get, child, remove } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHC3RcbJqzcUqybUzkGBWiIEJ3-gT75zY",
            authDomain: "aloha-a334e.firebaseapp.com",
            databaseURL: "https://aloha-a334e-default-rtdb.firebaseio.com",
            projectId: "aloha-a334e",
            storageBucket: "aloha-a334e.firebasestorage.app",
            messagingSenderId: "76882503799",
            appId: "1:76882503799:web:a1d9c218dd46bee3847e72"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        window.saveToFirebase = async (data) => {
            const key = data.phone.replace(/-/g, "");
            await set(push(ref(db, 'reservations/' + key)), data);
        };
        window.getFromFirebase = async (phone) => {
            const key = phone.replace(/-/g, "");
            const snapshot = await get(child(ref(db), `reservations/${key}`));
            return snapshot.exists() ? snapshot.val() : null;
        };
        window.getAllReservations = async () => {
            const snapshot = await get(ref(db, 'reservations'));
            if (snapshot.exists()) {
                const allData = snapshot.val();
                let flatList = [];
                Object.keys(allData).forEach(phoneKey => {
                    Object.keys(allData[phoneKey]).forEach(resKey => {
                        flatList.push({ ...allData[phoneKey][resKey], resKey, phoneKey });
                    });
                });
                return flatList.sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            }
            return [];
        };
        window.deleteFromFirebase = async (phone, resKey) => {
            const phoneKey = phone.replace(/-/g, "");
            await remove(ref(db, `reservations/${phoneKey}/${resKey}`));
        };
    </script>

    <style>
        /* 1. 마우스 커서 스타일 (하와이 테마) */
        * { cursor: none !important; }
        .cursor-dot { width: 8px; height: 8px; background: #00d2ff; border-radius: 50%; position: fixed; z-index: 1000000; pointer-events: none; transform: translate(-50%, -50%); border: 1px solid #fff; }
        .cursor-trail { position: fixed; z-index: 999999; pointer-events: none; font-size: 24px; filter: drop-shadow(0 0 5px rgba(0,210,255,0.8)); transition: transform 0.1s ease-out; }

        /* 기본 레이아웃 */
        html, body { height: 100%; overflow: hidden; font-family: 'Pretendard', sans-serif; background-color: #000; color: #fff; }
        .container { height: 100dvh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; }
        section { height: 100dvh; width: 100%; scroll-snap-align: start; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; background-size: cover !important; background-position: center !important; text-align: center; padding: 0 5%; }

        #home { background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1600'); }
        #booking { background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1505118380757-91f5f5632de0?w=1600'); }
        #check { background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1503756234508-e32369269deb?w=1600'); }
        #admin { background-image: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1454165833767-027eeea15c3e?w=1600'); }

        .indicator { position: fixed; left: 25px; top: 50%; transform: translateY(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 15px; }
        .dot { width: 10px; height: 10px; border: 1px solid #fff; background: rgba(255,255,255,0.2); transition: 0.3s; }
        .dot.active { background: #00d2ff; border-color: #00d2ff; transform: scale(1.3); }

        .menu-toggle { position: fixed; top: 25px; right: 25px; z-index: 1001; width: 50px; height: 50px; background: #00d2ff; color: white; border: none; font-size: 30px; border-radius: 8px; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.4s; }
        .menu-overlay.open { opacity: 1; visibility: visible; }
        .menu-link { font-size: 2.2rem; font-weight: 800; color: #fff; text-decoration: none; margin: 10px 0; }

        /* 폼 & 관리자 카드 */
        .form-card { background: white; color: #333; padding: 25px; border-radius: 20px; width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 10px; }
        .action-btn { background: #00d2ff; border: none; padding: 12px 20px; color: white; border-radius: 8px; font-weight: bold; }

        /* 어드민 테이블 고도화 */
        .admin-content { width: 100%; max-width: 1000px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; overflow: hidden; }
        .admin-table-container { overflow-x: auto; margin-bottom: 15px; min-height: 100px; }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 13px; text-align: left; }
        .admin-table th { background: #00d2ff; color: #000; padding: 10px; }
        .admin-table td { padding: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        
        .admin-controls { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; flex-wrap: wrap; gap: 10px; }
        .admin-controls select { background: #222; color: #fff; border: 1px solid #444; padding: 5px 10px; border-radius: 5px; }

        /* 페이지네이션 */
        .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 15px; }
        .page-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: #fff; padding: 5px 12px; border-radius: 4px; transition: 0.2s; }
        .page-btn.active { background: #00d2ff; color: #000; font-weight: bold; }
        .page-btn:disabled { opacity: 0.3; }

        #adminLogin { display: flex; flex-direction: column; gap: 10px; }
        #adminView { display: none; width: 100%; }
        #resultArea { margin-top: 15px; text-align: left; display: none; }
    </style>
</head>
<body>

    <!-- 마우스 커서 요소 -->
    <div class="cursor-dot" id="cursorDot"></div>
    <div class="cursor-trail" id="cursorTrail">🏄‍♂️</div>

    <button class="menu-toggle" onclick="toggleMenu()">≡</button>
    <div class="menu-overlay" id="menuOverlay">
        <a href="javascript:void(0)" class="menu-link" onclick="goToSection(0)">HOME</a>
        <a href="javascript:void(0)" class="menu-link" onclick="goToSection(1)">BOOKING</a>
        <a href="javascript:void(0)" class="menu-link" onclick="goToSection(2)">CHECK</a>
        <a href="javascript:void(0)" class="menu-link" onclick="goToSection(3)">ADMIN</a>
    </div>

    <div class="indicator">
        <div class="dot active" onclick="goToSection(0)"></div>
        <div class="dot" onclick="goToSection(1)"></div>
        <div class="dot" onclick="goToSection(2)"></div>
        <div class="dot" onclick="goToSection(3)"></div>
    </div>

    <div class="container" id="mainContainer">
        <section id="home"><h1>ALOHA VIBES</h1><p style="color: #00d2ff;">Experience Real Hawaii</p></section>

        <section id="booking">
            <h2 style="margin-bottom: 20px;">Booking Request</h2>
            <form action="https://formspree.io/f/xojpdaqq" method="POST" class="form-card" id="resForm">
                <input type="text" name="name" id="book_name" placeholder="성함" required style="padding:10px; border-radius:5px; border:1px solid #ddd;">
                <input type="tel" name="phone" id="book_phone" placeholder="연락처" maxlength="13" required style="padding:10px; border-radius:5px; border:1px solid #ddd;">
                <input type="text" id="rangeDate" name="dates" placeholder="일정 선택" readonly required style="padding:10px; border-radius:5px; border:1px solid #ddd;">
                <select name="product" id="book_product" required style="padding:10px; border-radius:5px; border:1px solid #ddd;">
                    <option value="">상품 선택</option>
                    <option>오아후 섬 일주</option><option>섬 전체 헬기 투어</option>
                    <option>하나우마베이 스노클링</option><option>하와이 스카이다이빙</option>
                </select>
                <input type="hidden" name="adults" id="book_adults" value="1">
                <input type="hidden" name="children" id="book_children" value="0">
                <button type="submit" class="action-btn" id="submitBtn">예약 신청</button>
            </form>
        </section>

        <section id="check">
            <h2>My Reservation</h2>
            <div class="form-card" style="margin-top: 20px;">
                <input type="tel" id="check_phone" placeholder="연락처를 입력하세요" style="padding:10px; border-radius:5px; border:1px solid #ddd;">
                <button class="action-btn" onclick="handleLookup()">조회하기</button>
                <div id="resultArea"></div>
            </div>
        </section>

        <section id="admin">
            <h2 style="margin-bottom: 20px;">Admin</h2>
            <div id="adminLogin" class="form-card">
                <input type="password" id="adminPw" placeholder="Admin Password" style="padding:10px; border-radius:5px; border:1px solid #ddd;">
                <button class="action-btn" onclick="checkAdmin()">로그인</button>
            </div>

            <div id="adminView" class="admin-content">
                <div class="admin-controls">
                    <div>
                        <span id="totalCount">Total: 0</span>
                        <select id="pageSize" onchange="changePageSize()" style="margin-left:10px;">
                            <option value="10">10줄 보기</option>
                            <option value="30">30줄 보기</option>
                            <option value="50">50줄 보기</option>
                        </select>
                    </div>
                    <button class="action-btn" style="padding: 5px 15px;" onclick="loadAdminData()">새로고침</button>
                </div>

                <div class="admin-table-container">
                    <table class="admin-table">
                        <thead>
                            <tr>
                                <th>신청시간</th>
                                <th>성함</th>
                                <th>연락처</th>
                                <th>상품</th>
                                <th>일정</th>
                            </tr>
                        </thead>
                        <tbody id="adminList"></tbody>
                    </table>
                </div>
                <div id="pagination" class="pagination"></div>
            </div>
        </section>
    </div>

    <script>
        // --- 1. 하와이풍 마우스 커서 로직 ---
        const dot = document.getElementById('cursorDot');
        const trail = document.getElementById('cursorTrail');
        let mouseX = 0, mouseY = 0, trailX = 0, trailY = 0;

        window.addEventListener('mousemove', (e) => {
            mouseX = e.clientX; mouseY = e.clientY;
            dot.style.left = mouseX + 'px';
            dot.style.top = mouseY + 'px';
        });

        function animateTrail() {
            // 서핑보드가 부드럽게 따라오는 속도 조절 (0.1 ~ 0.2)
            trailX += (mouseX - trailX) * 0.12;
            trailY += (mouseY - trailY) * 0.12;
            trail.style.left = (trailX + 15) + 'px'; // 살짝 옆으로 비껴나게
            trail.style.top = (trailY + 15) + 'px';
            requestAnimationFrame(animateTrail);
        }
        animateTrail();

        // --- 2. 기본 기능 (전화번호, 달력) ---
        document.getElementById('book_phone').addEventListener('input', (e) => {
            let v = e.target.value.replace(/[^0-9]/g, ""), r = "";
            if (v.length < 4) r = v;
            else if (v.length < 8) r = v.substr(0, 3) + "-" + v.substr(3);
            else r = v.substr(0, 3) + "-" + v.substr(3, 4) + "-" + v.substr(7);
            e.target.value = r;
        });

        flatpickr("#rangeDate", { mode: "range", locale: "ko", dateFormat: "y.m.d", minDate: "today" });

        // --- 3. 예약 및 조회 ---
        document.getElementById('resForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const data = { 
                name: document.getElementById('book_name').value, 
                phone: document.getElementById('book_phone').value, 
                dates: document.getElementById('rangeDate').value, 
                product: document.getElementById('book_product').value, 
                time: new Date().toLocaleString(),
                timestamp: Date.now() 
            };
            btn.innerText = "처리 중...";
            await window.saveToFirebase(data);
            alert("예약 신청이 완료되었습니다.");
            this.reset();
            btn.innerText = "예약 신청";
        });

        async function handleLookup() {
            const phone = document.getElementById('check_phone').value;
            const area = document.getElementById('resultArea');
            if (!phone) return;
            area.innerHTML = "조회 중..."; area.style.display = "block";
            const data = await window.getFromFirebase(phone);
            if (data) {
                area.innerHTML = "";
                Object.values(data).reverse().forEach(r => {
                    const d = document.createElement('div');
                    d.style.cssText = "background:#f0faff; padding:10px; border-radius:10px; margin-bottom:5px; border-left:4px solid #00d2ff;";
                    d.innerHTML = `<b>${r.product}</b><br><small>${r.dates}</small>`;
                    area.appendChild(d);
                });
            } else { area.innerHTML = "내역이 없습니다."; }
        }

        // --- 4. 어드민 페이지네이션 로직 ---
        let allData = [];
        let currentPage = 1;
        let pageSize = 10;

        function checkAdmin() {
            if (document.getElementById('adminPw').value === "aloha1234") {
                document.getElementById('adminLogin').style.display = "none";
                document.getElementById('adminView').style.display = "block";
                loadAdminData();
            } else { alert("비밀번호 오류"); }
        }

        async function loadAdminData() {
            allData = await window.getAllReservations();
            document.getElementById('totalCount').innerText = `Total: ${allData.length}`;
            currentPage = 1;
            renderAdminTable();
        }

        function changePageSize() {
            pageSize = parseInt(document.getElementById('pageSize').value);
            currentPage = 1;
            renderAdminTable();
        }

        function renderAdminTable() {
            const listArea = document.getElementById('adminList');
            listArea.innerHTML = "";
            
            if (allData.length === 0) {
                listArea.innerHTML = "<tr><td colspan='5' style='text-align:center; padding:50px;'>예약 내역이 없습니다.</td></tr>";
                document.getElementById('pagination').innerHTML = "";
                return;
            }

            const start = (currentPage - 1) * pageSize;
            const end = start + pageSize;
            const pageData = allData.slice(start, end);

            pageData.forEach(r => {
                const tr = document.createElement('tr');
                tr.innerHTML = `<td>${r.time}</td><td>${r.name}</td><td>${r.phone}</td><td>${r.product}</td><td>${r.dates}</td>`;
                listArea.appendChild(tr);
            });

            renderPagination();
        }

        function renderPagination() {
            const nav = document.getElementById('pagination');
            nav.innerHTML = "";
            const totalPages = Math.ceil(allData.length / pageSize);
            if (totalPages <= 1) return;

            const prevBtn = document.createElement('button');
            prevBtn.className = "page-btn"; prevBtn.innerText = "Prev";
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => { currentPage--; renderAdminTable(); };
            nav.appendChild(prevBtn);

            for (let i = 1; i <= totalPages; i++) {
                const btn = document.createElement('button');
                btn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                btn.innerText = i;
                btn.onclick = () => { currentPage = i; renderAdminTable(); };
                nav.appendChild(btn);
            }

            const nextBtn = document.createElement('button');
            nextBtn.className = "page-btn"; nextBtn.innerText = "Next";
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => { currentPage++; renderAdminTable(); };
            nav.appendChild(nextBtn);
        }

        function toggleMenu() { document.getElementById('menuOverlay').classList.toggle('open'); }
        function goToSection(i) { document.querySelectorAll('section')[i].scrollIntoView({ behavior: 'smooth' }); toggleMenu(); }

        document.getElementById('mainContainer').addEventListener('scroll', () => {
            let cur = 0;
            const sections = document.querySelectorAll('section');
            const container = document.getElementById('mainContainer');
            sections.forEach((s, i) => { if (container.scrollTop >= s.offsetTop - 100) cur = i; });
            document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === cur));
        });
    </script>
</body>
</html>
