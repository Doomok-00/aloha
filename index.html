<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ALOHA VIBES - 하와이 전문 여행사</title>
    
    <!-- 라이브러리 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>

    <!-- 파이어베이스 연결 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, push, set, get, child, remove } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHC3RcbJqzcUqybUzkGBWiIEJ3-gT75zY",
            authDomain: "aloha-a334e.firebaseapp.com",
            databaseURL: "https://aloha-a334e-default-rtdb.firebaseio.com",
            projectId: "aloha-a334e",
            storageBucket: "aloha-a334e.firebasestorage.app",
            messagingSenderId: "76882503799",
            appId: "1:76882503799:web:a1d9c218dd46bee3847e72"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 데이터 저장
        window.saveToFirebase = async (data) => {
            const key = data.phone.replace(/-/g, "");
            const reservationListRef = ref(db, 'reservations/' + key);
            const newResRef = push(reservationListRef);
            await set(newResRef, data);
        };

        // 데이터 조회 (키 값 포함하여 가져오기)
        window.getFromFirebase = async (phone) => {
            const key = phone.replace(/-/g, "");
            const dbRef = ref(db);
            const snapshot = await get(child(dbRef, `reservations/${key}`));
            return snapshot.exists() ? snapshot.val() : null;
        };

        // [신규] 데이터 삭제 함수
        window.deleteFromFirebase = async (phone, resKey) => {
            const phoneKey = phone.replace(/-/g, "");
            await remove(ref(db, `reservations/${phoneKey}/${resKey}`));
        };
    </script>

    <style>
        /* 기본 스타일 및 마우스 (기존 유지) */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @media (pointer: coarse) { .cursor-dot, .cursor-outline { display: none !important; } * { cursor: auto !important; } }
        @media (pointer: fine) {
            * { cursor: none !important; }
            .cursor-dot { width: 6px; height: 6px; background: #00d2ff; border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 1000000; transform: translate(-50%, -50%); }
            .cursor-outline { width: 36px; height: 36px; border: 1.5px solid rgba(255, 255, 255, 0.6); border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 999999; transform: translate(-50%, -50%); transition: width 0.2s, height 0.2s, border-color 0.2s; }
            .cursor-outline.hover { width: 54px; height: 54px; border-color: #00d2ff; background: rgba(0, 210, 255, 0.05); }
        }
        html, body { height: 100%; overflow: hidden; font-family: 'Pretendard', sans-serif; background-color: #000; color: #fff; }
        .container { height: 100dvh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        section { height: 100dvh; width: 100%; scroll-snap-align: start; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; background-size: cover; background-position: center; text-align: center; padding: 0 10%; }

        /* 배경 이미지 */
        #home { background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1600'); }
        #tours { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=1600'); }
        #booking { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1542259005453-d93f3b203d98?w=1600'); }
        #check { background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1503756234508-e32369269deb?w=1600'); }
        #contact { background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1505881502353-a1986add3732?w=1600'); }

        .indicator { position: fixed; left: 25px; top: 50%; transform: translateY(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 15px; }
        .dot { width: 10px; height: 10px; border: 1px solid #fff; background: rgba(255,255,255,0.2); transition: 0.3s; }
        .dot.active { background: #00d2ff; border-color: #00d2ff; transform: scale(1.3); }

        .menu-toggle { position: fixed; top: 25px; right: 25px; z-index: 1001; width: 50px; height: 50px; background: #00d2ff; color: white; border: none; font-size: 30px; border-radius: 8px; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.4s; }
        .menu-overlay.open { opacity: 1; visibility: visible; }
        .menu-link { font-size: 2.5rem; font-weight: 800; color: #fff; text-decoration: none; letter-spacing: 5px; margin: 15px 0; }

        .tour-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 850px; margin-bottom: 25px; }
        .tour-card { background: rgba(255,255,255,0.12); backdrop-filter: blur(10px); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); }
        .action-btn { background: #00d2ff; border: none; padding: 15px 30px; color: white; border-radius: 8px; font-weight: bold; font-size: 16px; margin-top: 10px; }

        .form-card { background: white; color: #333; padding: 25px; border-radius: 20px; width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 10px; }
        .form-card input, .form-card select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; font-family: inherit; }
        
        /* 조회 결과 리스트 디자인 */
        #resultArea { margin-top: 15px; width: 100%; max-height: 280px; overflow-y: auto; text-align: left; display: none; }
        .res-item { background: #f0faff; padding: 15px; border-radius: 12px; border-left: 5px solid #00d2ff; margin-bottom: 10px; position: relative; display: flex; justify-content: space-between; align-items: center; }
        .res-info { flex: 1; }
        .res-info b { color: #007fa3; display: block; margin-bottom: 3px; }
        .res-info p { color: #555; font-size: 13px; margin: 2px 0; }
        
        /* [신규] 취소 버튼 스타일 */
        .cancel-btn { background: #ff3b30; color: #fff; border: none; padding: 8px 12px; border-radius: 6px; font-size: 12px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .cancel-btn:hover { background: #d32f2f; }

        .map-box { width: 100%; height: 420px; border-radius: 20px; overflow: hidden; border: 2px solid #00d2ff; }
        @media (max-width: 768px) { .tour-container { grid-template-columns: 1fr; } h1 { font-size: 2.5rem !important; } }
    </style>
</head>
<body>

    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <button class="menu-toggle" onclick="toggleMenu()">≡</button>
    <div class="menu-overlay" id="menuOverlay">
        <a href="javascript:void(0)" class="menu-link" onclick="goToSection(0)">HOME</a>
        <a href="javascript:void(0)" class="menu-link" onclick="goToSection(1)">TOURS</a>
        <a href="javascript:void(0)" class="menu-link" onclick="goToSection(2)">BOOKING</a>
        <a href="javascript:void(0)" class="menu-link" onclick="goToSection(3)">CHECK</a>
        <a href="javascript:void(0)" class="menu-link" onclick="goToSection(4)">LOCATION</a>
    </div>

    <div class="indicator">
        <div class="dot active" onclick="goToSection(0)"></div>
        <div class="dot" onclick="goToSection(1)"></div>
        <div class="dot" onclick="goToSection(2)"></div>
        <div class="dot" onclick="goToSection(3)"></div>
        <div class="dot" onclick="goToSection(4)"></div>
    </div>

    <div class="container" id="mainContainer">
        <section id="home"><h1>ALOHA VIBES</h1><p style="color: #00d2ff;">완벽한 하와이 어드벤처</p></section>
        
        <section id="tours">
            <h2 style="margin-bottom: 30px;">Premium Tours</h2>
            <div class="tour-container">
                <div class="tour-card"><h3>오아후 섬 투어</h3><p>$149</p></div>
                <div class="tour-card"><h3>헬기 투어</h3><p>$320</p></div>
                <div class="tour-card"><h3>스노클링</h3><p>$85</p></div>
                <div class="tour-card"><h3>스카이다이빙 🪂</h3><p>$250</p></div>
            </div>
            <button class="action-btn" style="padding: 18px 60px;" onclick="goToSection(2)">예약하러 가기</button>
        </section>

        <section id="booking">
            <h2 style="margin-bottom: 20px;">Booking Request</h2>
            <form action="https://formspree.io/f/xojpdaqq" method="POST" class="form-card" id="resForm">
                <input type="text" name="name" id="book_name" placeholder="성함" required>
                <input type="tel" name="phone" id="book_phone" placeholder="연락처 (010-0000-0000)" maxlength="13" required>
                <input type="email" name="email" id="book_email" placeholder="이메일" required>
                <input type="text" id="rangeDate" name="dates" placeholder="일정 선택" readonly required>
                <select name="product" id="book_product" required>
                    <option value="">상품 선택</option>
                    <option>오아후 섬 일주</option><option>섬 전체 헬기 투어</option>
                    <option>하나우마베이 스노클링</option><option>하와이 스카이다이빙</option>
                </select>
                <button type="submit" class="action-btn" id="submitBtn">예약 신청 완료</button>
            </form>
        </section>

        <section id="check">
            <h2 style="margin-bottom: 20px;">Check Reservation</h2>
            <div class="form-card">
                <input type="text" id="check_name" placeholder="성함">
                <input type="tel" id="check_phone" placeholder="연락처" maxlength="13">
                <button type="button" class="action-btn" onclick="handleLookup()">내역 조회하기</button>
                <div id="resultArea"></div>
            </div>
        </section>

        <section id="contact">
            <div class="map-box"><iframe src="https://www.google.com/maps?q=Waikiki+Beach+Honolulu+HI&output=embed" width="100%" height="100%" style="border:0;"></iframe></div>
            <p style="margin-top:10px; font-size:14px; color:rgba(255,255,255,0.7);">📍 2335 Kalākaua Ave, Honolulu, HI 96815</p>
        </section>
    </div>

    <script>
        // 1. 하이픈 자동
        const handlePhone = (e) => {
            let v = e.target.value.replace(/[^0-9]/g, ""), r = "";
            if (v.length < 4) r = v;
            else if (v.length < 8) r = v.substr(0, 3) + "-" + v.substr(3);
            else r = v.substr(0, 3) + "-" + v.substr(3, 4) + "-" + v.substr(7);
            e.target.value = r;
        };
        document.getElementById('book_phone').addEventListener('input', handlePhone);
        document.getElementById('check_phone').addEventListener('input', handlePhone);

        // 2. 마우스
        const dot = document.querySelector('.cursor-dot');
        const outline = document.querySelector('.cursor-outline');
        if (!window.matchMedia("(pointer: coarse)").matches) {
            window.addEventListener('mousemove', (e) => {
                dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px';
                outline.animate({ left: e.clientX + 'px', top: e.clientY + 'px' }, { duration: 300, fill: "forwards" });
            });
            document.querySelectorAll('button, a, input, select, .tour-card, .dot').forEach(el => {
                el.addEventListener('mouseenter', () => outline.classList.add('hover'));
                el.addEventListener('mouseleave', () => outline.classList.remove('hover'));
            });
        }

        // 3. 달력
        flatpickr("#rangeDate", {
            mode: "range", locale: "ko", dateFormat: "y.m.d", minDate: "today", disableMobile: "true",
            onClose: function(s) { if(s.length===2) this.input.value = this.formatDate(s[0],"y.m.d")+"~"+this.formatDate(s[1],"y.m.d")+" ("+(Math.ceil(Math.abs(s[1]-s[0])/(86400000))+1)+"일)"; }
        });

        // 4. 예약 신청
        document.getElementById('resForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const data = { 
                name: document.getElementById('book_name').value.trim(), 
                phone: document.getElementById('book_phone').value, 
                email: document.getElementById('book_email').value,
                dates: document.getElementById('rangeDate').value, 
                product: document.getElementById('book_product').value, 
                time: new Date().toLocaleString() 
            };
            btn.innerText = "전송 중...";
            try {
                const res = await fetch(this.action, { method: 'POST', body: new FormData(this), headers: { 'Accept': 'application/json' } });
                if (res.ok) { await window.saveToFirebase(data); alert("예약 신청이 완료되었습니다."); this.reset(); }
            } catch (err) { alert("전송 오류"); }
            btn.innerText = "예약 신청 완료";
        });

        // 5. 조회 및 취소 연동
        async function handleLookup() {
            const name = document.getElementById('check_name').value.trim();
            const phone = document.getElementById('check_phone').value;
            const area = document.getElementById('resultArea');
            if (!name || !phone) return;

            area.innerHTML = "<p style='color:#333; text-align:center;'>조회 중...</p>";
            area.style.display = "block";
            
            const data = await window.getFromFirebase(phone);
            if (data) {
                const keys = Object.keys(data);
                const myRes = keys.filter(k => data[k].name === name);

                if (myRes.length > 0) {
                    area.innerHTML = `<h4 style='color:#007fa3; margin-bottom:10px;'>총 ${myRes.length}건</h4>`;
                    myRes.reverse().forEach(key => {
                        const r = data[key];
                        const item = document.createElement('div');
                        item.className = 'res-item';
                        item.innerHTML = `
                            <div class="res-info">
                                <b>📦 ${r.product}</b>
                                <p>📅 ${r.dates}</p>
                                <p>🕒 ${r.time}</p>
                            </div>
                            <button class="cancel-btn" onclick="handleCancel('${phone}', '${key}', '${r.name}', '${r.product}', '${r.dates}')">취소</button>
                        `;
                        area.appendChild(item);
                    });
                } else { area.innerHTML = "<p style='color:red; text-align:center;'>일치하는 이름이 없습니다.</p>"; }
            } else { area.innerHTML = "<p style='color:red; text-align:center;'>예약 내역이 없습니다.</p>"; }
        }

        // 6. [핵심] 취소 처리 함수
        async function handleCancel(phone, key, name, product, dates) {
            if (!confirm(`[${product}] 예약을 취소하시겠습니까?\n취소 시 관리자에게 이메일 알림이 발송됩니다.`)) return;

            // 관리자에게 취소 메일 발송 (Formspree 활용)
            const cancelData = new FormData();
            cancelData.append("상태", "⚠️ 예약 취소 요청");
            cancelData.append("고객명", name);
            cancelData.append("연락처", phone);
            cancelData.append("취소상품", product);
            cancelData.append("취소일정", dates);

            try {
                // 이메일 전송
                await fetch("https://formspree.io/f/xojpdaqq", {
                    method: 'POST',
                    body: cancelData,
                    headers: { 'Accept': 'application/json' }
                });

                // 파이어베이스 데이터 삭제
                await window.deleteFromFirebase(phone, key);
                
                alert("예약이 정상적으로 취소되었습니다.");
                handleLookup(); // 목록 새로고침
            } catch (err) {
                alert("취소 처리 중 오류가 발생했습니다.");
            }
        }

        // 메뉴/스크롤
        function toggleMenu() { document.getElementById('menuOverlay').classList.toggle('open'); }
        function goToSection(i) { document.querySelectorAll('section')[i].scrollIntoView({ behavior: 'smooth' }); if(document.getElementById('menuOverlay').classList.contains('open')) toggleMenu(); }
        document.getElementById('mainContainer').addEventListener('scroll', () => {
            let cur = 0;
            document.querySelectorAll('section').forEach((s, i) => { if (document.getElementById('mainContainer').scrollTop >= s.offsetTop - 50) cur = i; });
            document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === cur));
        });
    </script>
</body>
</html>
