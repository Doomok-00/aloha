<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ALOHA VIBES - 관리자 모드 포함</title>
    
    <!-- 라이브러리 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>

    <!-- 파이어베이스 연결 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-app.js";
        import { getDatabase, ref, push, set, get, child, remove } from "https://www.gstatic.com/firebasejs/9.22.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHC3RcbJqzcUqybUzkGBWiIEJ3-gT75zY",
            authDomain: "aloha-a334e.firebaseapp.com",
            databaseURL: "https://aloha-a334e-default-rtdb.firebaseio.com",
            projectId: "aloha-a334e",
            storageBucket: "aloha-a334e.firebasestorage.app",
            messagingSenderId: "76882503799",
            appId: "1:76882503799:web:a1d9c218dd46bee3847e72"
        };
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // 데이터 저장 (timestamp 추가)
        window.saveToFirebase = async (data) => {
            const key = data.phone.replace(/-/g, "");
            await set(push(ref(db, 'reservations/' + key)), data);
        };

        // 개인 조회
        window.getFromFirebase = async (phone) => {
            const key = phone.replace(/-/g, "");
            const snapshot = await get(child(ref(db), `reservations/${key}`));
            return snapshot.exists() ? snapshot.val() : null;
        };

        // [추가] 관리자용 전체 조회
        window.getAllReservations = async () => {
            const snapshot = await get(ref(db, 'reservations'));
            if (snapshot.exists()) {
                const allData = snapshot.val();
                let flatList = [];
                // 폰번호별로 묶인 데이터를 하나의 배열로 풀기
                Object.keys(allData).forEach(phoneKey => {
                    Object.keys(allData[phoneKey]).forEach(resKey => {
                        flatList.push({ ...allData[phoneKey][resKey], resKey, phoneKey });
                    });
                });
                // 시간순 정렬 (최신순)
                return flatList.sort((a, b) => b.timestamp - a.timestamp);
            }
            return [];
        };

        window.deleteFromFirebase = async (phone, resKey) => {
            const phoneKey = phone.replace(/-/g, "");
            await remove(ref(db, `reservations/${phoneKey}/${resKey}`));
        };
    </script>

    <style>
        /* 기존 스타일 유지 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @media (pointer: coarse) { .cursor-dot, .cursor-outline { display: none !important; } * { cursor: auto !important; } }
        
        @media (pointer: fine) {
            * { cursor: none !important; }
            .cursor-dot { width: 6px; height: 6px; background: #fff; border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 1000000; transform: translate(-50%, -50%); mix-blend-mode: difference; will-change: transform; }
            .cursor-outline { width: 36px; height: 36px; border: 2px solid #fff; border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 999999; transform: translate(-50%, -50%); mix-blend-mode: difference; will-change: transform; transition: width 0.15s ease-out, height 0.15s ease-out; }
            .cursor-outline.hover { width: 56px; height: 56px; background: rgba(255, 255, 255, 0.2); }
        }

        html, body { height: 100%; overflow: hidden; font-family: 'Pretendard', sans-serif; background-color: #000; color: #fff; }
        .container { height: 100dvh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        section { height: 100dvh; width: 100%; scroll-snap-align: start; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; background-size: cover !important; background-position: center !important; text-align: center; padding: 0 5%; }

        /* 배경 이미지 */
        #home { background-image: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1600'); }
        #tours { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=1600'); }
        #booking { background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1505118380757-91f5f5632de0?w=1600'); }
        #check { background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1503756234508-e32369269deb?w=1600'); }
        #admin { background-image: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), url('https://images.unsplash.com/photo-1454165833767-027eeea15c3e?w=1600'); }

        /* UI 구성 요소 */
        .indicator { position: fixed; left: 25px; top: 50%; transform: translateY(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 15px; }
        .dot { width: 10px; height: 10px; border: 1px solid #fff; background: rgba(255,255,255,0.2); transition: 0.3s; cursor: pointer; }
        .dot.active { background: #00d2ff; border-color: #00d2ff; transform: scale(1.3); }

        .menu-toggle { position: fixed; top: 25px; right: 25px; z-index: 1001; width: 50px; height: 50px; background: #00d2ff; color: white; border: none; font-size: 30px; border-radius: 8px; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.92); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.4s; }
        .menu-overlay.open { opacity: 1; visibility: visible; }
        .menu-link { font-size: 2.2rem; font-weight: 800; color: #fff; text-decoration: none; letter-spacing: 5px; margin: 10px 0; }

        .form-card { background: white; color: #333; padding: 25px; border-radius: 20px; width: 100%; max-width: 440px; display: flex; flex-direction: column; gap: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .form-card input, .form-card select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 100%; font-size: 16px; }
        .action-btn { background: #00d2ff; border: none; padding: 15px 30px; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; }

        /* 관리자 테이블 스타일 */
        .admin-content { width: 100%; max-width: 1000px; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; overflow-x: auto; }
        .admin-table { width: 100%; border-collapse: collapse; color: #fff; font-size: 13px; min-width: 700px; }
        .admin-table th { background: #00d2ff; color: #000; padding: 12px; }
        .admin-table td { padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .admin-table tr:hover { background: rgba(255,255,255,0.1); }
        
        #adminLogin { display: flex; flex-direction: column; gap: 15px; }
        #adminView { display: none; width: 100%; }

        #resultArea { margin-top: 15px; width: 100%; max-height: 250px; overflow-y: auto; text-align: left; display: none; }
        .res-item { background: #f0faff; padding: 15px; border-radius: 12px; border-left: 5px solid #00d2ff; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        .cancel-btn { background: #ff3b30; color: #fff; border: none; padding: 8px 12px; border-radius: 6px; font-size: 11px; font-weight: bold; cursor: pointer; }

        @media (max-width: 768px) { h1 { font-size: 2.5rem !important; } .menu-link { font-size: 1.5rem; } }
    </style>
</head>
<body>

    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <button class="menu-toggle" onclick="toggleMenu()">≡</button>
    <div class="menu-overlay" id="menuOverlay">
        <a href="javascript:void(0)" class="menu-link" onclick="goToSection(0)">HOME</a>
        <a href="javascript:void(0)" class="menu-link" onclick="goToSection(1)">TOURS</a>
        <a href="javascript:void(0)" class="menu-link" onclick="goToSection(2)">BOOKING</a>
        <a href="javascript:void(0)" class="menu-link" onclick="goToSection(3)">CHECK</a>
        <a href="javascript:void(0)" class="menu-link" onclick="goToSection(4)">ADMIN</a>
    </div>

    <div class="indicator">
        <div class="dot active" onclick="goToSection(0)"></div>
        <div class="dot" onclick="goToSection(1)"></div>
        <div class="dot" onclick="goToSection(2)"></div>
        <div class="dot" onclick="goToSection(3)"></div>
        <div class="dot" onclick="goToSection(4)"></div>
    </div>

    <div class="container" id="mainContainer">
        <section id="home"><h1>ALOHA VIBES</h1><p style="color: #00d2ff;">완벽한 하와이 어드벤처</p></section>
        
        <section id="tours">
            <h2 style="margin-bottom: 30px;">Premium Tours</h2>
            <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 800px; margin-bottom: 20px;">
                <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px;"><h3>오아후 섬 투어</h3><p>$149</p></div>
                <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px;"><h3>헬기 투어</h3><p>$320</p></div>
                <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px;"><h3>스노클링</h3><p>$85</p></div>
                <div style="background: rgba(255,255,255,0.1); padding: 20px; border-radius: 15px;"><h3>스카이다이빙</h3><p>$250</p></div>
            </div>
            <button class="action-btn" onclick="goToSection(2)">예약하기</button>
        </section>

        <section id="booking">
            <h2 style="margin-bottom: 20px;">Booking Request</h2>
            <form action="https://formspree.io/f/xojpdaqq" method="POST" class="form-card" id="resForm">
                <input type="text" name="name" id="book_name" placeholder="성함" required>
                <input type="tel" name="phone" id="book_phone" placeholder="연락처" maxlength="13" required>
                <input type="email" name="email" id="book_email" placeholder="이메일" required>
                <input type="text" id="rangeDate" name="dates" placeholder="일정 선택" readonly required>
                <select name="product" id="book_product" required>
                    <option value="">상품 선택</option>
                    <option>오아후 섬 일주</option><option>섬 전체 헬기 투어</option>
                    <option>하나우마베이 스노클링</option><option>하와이 스카이다이빙</option>
                </select>
                <div style="display: flex; gap: 10px;">
                    <select name="adults" id="book_adults"><option value="1">성인 1명</option><option value="2">성인 2명</option><option value="3">성인 3명</option></select>
                    <select name="children" id="book_children"><option value="0">어린이 0명</option><option value="1">어린이 1명</option></select>
                </div>
                <button type="submit" class="action-btn" id="submitBtn">예약 신청 완료</button>
            </form>
        </section>

        <section id="check">
            <h2>Check My Reservation</h2>
            <div class="form-card" style="margin-top: 20px;">
                <input type="tel" id="check_phone" placeholder="연락처를 입력하세요">
                <button class="action-btn" onclick="handleLookup()">조회하기</button>
                <div id="resultArea"></div>
            </div>
        </section>

        <!-- 관리자 섹션 추가 -->
        <section id="admin">
            <h2 style="margin-bottom: 20px;">Admin Dashboard</h2>
            
            <div id="adminLogin" class="form-card">
                <p style="font-size: 14px; margin-bottom: 5px;">관리자 비밀번호를 입력하세요.</p>
                <input type="password" id="adminPw" placeholder="Password">
                <button class="action-btn" onclick="checkAdmin()">접속하기</button>
            </div>

            <div id="adminView" class="admin-content">
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                    <h3 id="totalCount">전체 예약 내역: 0건</h3>
                    <button class="action-btn" style="padding: 8px 15px; font-size: 12px;" onclick="loadAdminData()">새로고침</button>
                </div>
                <table class="admin-table">
                    <thead>
                        <tr>
                            <th>신청시간</th>
                            <th>성함</th>
                            <th>연락처</th>
                            <th>상품</th>
                            <th>일정</th>
                            <th>인원</th>
                        </tr>
                    </thead>
                    <tbody id="adminList">
                        <!-- 데이터 로드 위치 -->
                    </tbody>
                </table>
            </div>
        </section>
    </div>

    <script>
        // --- 마우스 커서 및 기본 기능 ---
        const dot = document.querySelector('.cursor-dot');
        const outline = document.querySelector('.cursor-outline');
        let mouseX = 0, mouseY = 0, outX = 0, outY = 0;

        if (!window.matchMedia("(pointer: coarse)").matches) {
            window.addEventListener('mousemove', (e) => {
                mouseX = e.clientX; mouseY = e.clientY;
                dot.style.transform = `translate3d(${mouseX}px, ${mouseY}px, 0) translate(-50%, -50%)`;
            });
            function animate() {
                outX += (mouseX - outX) * 0.2; outY += (mouseY - outY) * 0.2;
                outline.style.transform = `translate3d(${outX}px, ${outY}px, 0) translate(-50%, -50%)`;
                requestAnimationFrame(animate);
            }
            animate();
        }

        const handlePhone = (e) => {
            let v = e.target.value.replace(/[^0-9]/g, ""), r = "";
            if (v.length < 4) r = v;
            else if (v.length < 8) r = v.substr(0, 3) + "-" + v.substr(3);
            else r = v.substr(0, 3) + "-" + v.substr(3, 4) + "-" + v.substr(7);
            e.target.value = r;
        };
        document.getElementById('book_phone').addEventListener('input', handlePhone);
        document.getElementById('check_phone').addEventListener('input', handlePhone);

        flatpickr("#rangeDate", { mode: "range", locale: "ko", dateFormat: "y.m.d", minDate: "today" });

        // --- 예약 로직 ---
        document.getElementById('resForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const data = { 
                name: document.getElementById('book_name').value, 
                phone: document.getElementById('book_phone').value, 
                email: document.getElementById('book_email').value, 
                dates: document.getElementById('rangeDate').value, 
                product: document.getElementById('book_product').value, 
                adults: document.getElementById('book_adults').value, 
                children: document.getElementById('book_children').value, 
                time: new Date().toLocaleString(),
                timestamp: Date.now() // 정렬용 타임스탬프
            };
            btn.innerText = "전송 중...";
            try {
                const res = await fetch(this.action, { method: 'POST', body: new FormData(this), headers: { 'Accept': 'application/json' } });
                if (res.ok) { 
                    await window.saveToFirebase(data); 
                    alert("예약 신청이 완료되었습니다."); 
                    this.reset(); 
                }
            } catch (err) { alert("오류 발생"); }
            btn.innerText = "예약 신청 완료";
        });

        // --- 조회 로직 ---
        async function handleLookup() {
            const phone = document.getElementById('check_phone').value;
            const area = document.getElementById('resultArea');
            if (!phone) return;
            area.innerHTML = "조회 중..."; area.style.display = "block";
            const data = await window.getFromFirebase(phone);
            if (data) {
                area.innerHTML = "";
                Object.keys(data).reverse().forEach(key => {
                    const r = data[key];
                    const item = document.createElement('div');
                    item.className = 'res-item';
                    item.innerHTML = `<div><b>${r.product}</b><br><small>${r.dates}</small></div><button class="cancel-btn" onclick="handleCancel('${phone}', '${key}')">취소</button>`;
                    area.appendChild(item);
                });
            } else { area.innerHTML = "내역이 없습니다."; }
        }

        // --- 관리자 기능 ---
        function checkAdmin() {
            const pw = document.getElementById('adminPw').value;
            if (pw === "aloha1234") { // 여기에 관리자 비밀번호 설정
                document.getElementById('adminLogin').style.display = "none";
                document.getElementById('adminView').style.display = "block";
                loadAdminData();
            } else {
                alert("비밀번호가 틀렸습니다.");
            }
        }

        async function loadAdminData() {
            const listArea = document.getElementById('adminList');
            listArea.innerHTML = "<tr><td colspan='6'>데이터를 불러오는 중...</td></tr>";
            
            const allData = await window.getAllReservations();
            document.getElementById('totalCount').innerText = `전체 예약 내역: ${allData.length}건`;
            
            listArea.innerHTML = "";
            allData.forEach(r => {
                const tr = document.createElement('tr');
                tr.innerHTML = `
                    <td>${r.time}</td>
                    <td>${r.name}</td>
                    <td>${r.phone}</td>
                    <td>${r.product}</td>
                    <td>${r.dates}</td>
                    <td>성인 ${r.adults} / 소인 ${r.children}</td>
                `;
                listArea.appendChild(tr);
            });
        }

        // --- 내비게이션 ---
        function toggleMenu() { document.getElementById('menuOverlay').classList.toggle('open'); }
        function goToSection(i) { 
            document.querySelectorAll('section')[i].scrollIntoView({ behavior: 'smooth' }); 
            if(document.getElementById('menuOverlay').classList.contains('open')) toggleMenu(); 
        }

        document.getElementById('mainContainer').addEventListener('scroll', () => {
            let cur = 0;
            const sections = document.querySelectorAll('section');
            const container = document.getElementById('mainContainer');
            sections.forEach((s, i) => { if (container.scrollTop >= s.offsetTop - 100) cur = i; });
            document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === cur));
        });
    </script>
</body>
</html>
