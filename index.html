<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALOHA VIBES - 하와이 전문 여행사</title>
    <style>
        /* 1. 기본 스타일 및 마우스 커서 숨기기 */
        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        html, body { height: 100%; overflow: hidden; font-family: 'Pretendard', sans-serif; background-color: #000; }

        /* 2. 부드러운 마우스 애니메이션 포인터 */
        .cursor-dot {
            width: 8px; height: 8px; background: #00d2ff; border-radius: 50%;
            position: fixed; top: 0; left: 0; pointer-events: none; z-index: 10000;
            transform: translate(-50%, -50%);
        }
        .cursor-outline {
            width: 30px; height: 30px; border: 2px solid rgba(0, 210, 255, 0.5); border-radius: 50%;
            position: fixed; top: 0; left: 0; pointer-events: none; z-index: 9999;
            transform: translate(-50%, -50%);
            transition: width 0.2s, height 0.2s, background 0.2s;
        }
        .cursor-outline.hover { width: 60px; height: 60px; background: rgba(0, 210, 255, 0.1); border-color: #00d2ff; }

        /* 3. 풀페이지 컨테이너 */
        .container {
            height: 100vh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth;
        }
        section {
            height: 100vh; width: 100%; scroll-snap-align: start;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            position: relative; background-size: cover; background-position: center;
            color: white; text-align: center; padding: 0 10%;
        }

        /* 배경 이미지 설정 (가장 안정적인 소스) */
        #home { background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?auto=format&fit=crop&w=1600&q=80'); }
        #tours { background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1542259005453-d93f3b203d98?auto=format&fit=crop&w=1600&q=80'); }
        #booking { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=1600&q=80'); }
        #contact { background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1505881502353-a1986add3732?auto=format&fit=crop&w=1600&q=80'); }

        /* 4. 왼쪽 인디케이터 (네모 버튼) */
        .indicator {
            position: fixed; left: 30px; top: 50%; transform: translateY(-50%);
            z-index: 1000; display: flex; flex-direction: column; gap: 15px;
        }
        .dot { width: 12px; height: 12px; border: 1px solid #fff; transition: 0.3s; background: rgba(255,255,255,0.2); }
        .dot.active { background: #00d2ff; border-color: #00d2ff; transform: scale(1.3); }

        /* 5. 변경된 텍스트 메뉴 버튼 및 오버레이 */
        .menu-toggle {
            position: fixed; top: 30px; right: 30px; z-index: 1001;
            width: 50px; height: 50px; background: #00d2ff; color: white;
            border: none; font-size: 30px; border-radius: 5px;
        }
        .menu-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); z-index: 1000;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            opacity: 0; visibility: hidden; transition: 0.4s ease;
        }
        .menu-overlay.open { opacity: 1; visibility: visible; }
        .menu-list { list-style: none; text-align: center; }
        .menu-item { margin: 20px 0; }
        .menu-link {
            font-size: 3.5rem; font-weight: 800; color: #fff; text-decoration: none;
            letter-spacing: 8px; transition: 0.3s; display: inline-block;
        }
        .menu-link:hover { color: #00d2ff; transform: scale(1.1); }

        /* 6. 여행 상품 카드 (Section 2) */
        .tour-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 100%; max-width: 850px; }
        .tour-card { 
            background: rgba(255,255,255,0.12); backdrop-filter: blur(10px); 
            padding: 25px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.2); 
        }
        .tour-card h3 { color: #00d2ff; font-size: 1.3rem; margin-bottom: 5px; }
        .tour-card .price { font-size: 1.4rem; font-weight: bold; color: #ffd700; margin: 10px 0; }
        .book-btn { background: #00d2ff; border: none; padding: 10px 20px; color: white; border-radius: 5px; font-weight: bold; }

        /* 7. 예약 양식 (Section 3) */
        .booking-form { 
            background: white; color: #333; padding: 35px; border-radius: 20px; 
            width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 12px; 
        }
        .booking-form input, .booking-form select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 100%; }
        .date-group { display: flex; gap: 10px; }
        .date-group div { flex: 1; text-align: left; }
        .date-group label { font-size: 11px; font-weight: bold; margin-bottom: 5px; display: block; }

        /* 8. 위치 및 구글 지도 (Section 4 - 가려짐 방지 사이즈) */
        .contact-info { width: 100%; max-width: 650px; display: flex; flex-direction: column; gap: 20px; }
        .map-box { width: 100%; height: 320px; border-radius: 15px; overflow: hidden; border: 2px solid #00d2ff; }
        .info-box { background: rgba(0,0,0,0.75); padding: 25px; border-radius: 15px; text-align: left; }

        @media (max-width: 768px) {
            .tour-container { grid-template-columns: 1fr; }
            .menu-link { font-size: 2.2rem; }
            section { padding: 0 40px; }
        }
    </style>
</head>
<body>

    <!-- 마우스 애니메이션 커서 -->
    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <!-- 메뉴 버튼 -->
    <button class="menu-toggle" onclick="toggleMenu()">≡</button>
    
    <!-- 텍스트 기반 팝업 메뉴 -->
    <div class="menu-overlay" id="menuOverlay">
        <ul class="menu-list">
            <li class="menu-item"><a href="javascript:void(0)" class="menu-link" onclick="goToSection(0)">HOME</a></li>
            <li class="menu-item"><a href="javascript:void(0)" class="menu-link" onclick="goToSection(1)">TOURS</a></li>
            <li class="menu-item"><a href="javascript:void(0)" class="menu-link" onclick="goToSection(2)">BOOKING</a></li>
            <li class="menu-item"><a href="javascript:void(0)" class="menu-link" onclick="goToSection(3)">LOCATION</a></li>
        </ul>
    </div>

    <!-- 왼쪽 인디케이터 -->
    <div class="indicator">
        <div class="dot active" onclick="goToSection(0)"></div>
        <div class="dot" onclick="goToSection(1)"></div>
        <div class="dot" onclick="goToSection(2)"></div>
        <div class="dot" onclick="goToSection(3)"></div>
    </div>

    <div class="container" id="mainContainer">
        <!-- 섹션 1: 홈 -->
        <section id="home">
            <h1 style="font-size: 4rem; letter-spacing: 12px; margin-bottom: 15px;">ALOHA VIBES</h1>
            <p style="font-size: 1.5rem; color: #00d2ff;">가장 완벽한 하와이 어드벤처의 시작</p>
        </section>

        <!-- 섹션 2: 투어 패키지 (스카이다이빙 포함) -->
        <section id="tours">
            <h2 style="margin-bottom: 35px; font-size: 2.5rem; letter-spacing: 2px;">Premium Tours</h2>
            <div class="tour-container">
                <div class="tour-card">
                    <h3>오아후 섬 일주</h3>
                    <p class="price">$149</p>
                    <button class="book-btn" onclick="goToSection(2)">예약하기</button>
                </div>
                <div class="tour-card">
                    <h3>섬 전체 헬기 투어</h3>
                    <p class="price">$320</p>
                    <button class="book-btn" onclick="goToSection(2)">예약하기</button>
                </div>
                <div class="tour-card">
                    <h3>하나우마베이 스노클링</h3>
                    <p class="price">$85</p>
                    <button class="book-btn" onclick="goToSection(2)">예약하기</button>
                </div>
                <div class="tour-card">
                    <h3>하와이 스카이다이빙 🪂</h3>
                    <p class="price">$250</p>
                    <button class="book-btn" onclick="goToSection(2)">예약하기</button>
                </div>
            </div>
        </section>

        <!-- 섹션 3: 예약하기 (이메일 및 달력 자동화) -->
        <section id="booking">
            <h2 style="margin-bottom: 25px; font-size: 2rem;">Online Booking</h2>
            <form class="booking-form">
                <input type="text" placeholder="성함 (Full Name)" required>
                <input type="tel" placeholder="연락처 (Phone Number)" required>
                <input type="email" placeholder="이메일 (Email Address)" required>
                <div class="date-group">
                    <div>
                        <label>예약 시작일</label>
                        <input type="date" id="startDate" required>
                    </div>
                    <div>
                        <label>예약 종료일</label>
                        <input type="date" id="endDate" required>
                    </div>
                </div>
                <select required>
                    <option value="">상품을 선택하세요</option>
                    <option>오아후 섬 일주</option>
                    <option>섬 전체 헬기 투어</option>
                    <option>하나우마베이 스노클링</option>
                    <option>하와이 스카이다이빙</option>
                </select>
                <button type="submit" class="book-btn" style="height: 50px; font-size: 1.1rem; margin-top: 10px;">예약 신청 완료</button>
            </form>
        </section>

        <!-- 섹션 4: 위치 및 지도 (가려짐 해결 버전) -->
        <section id="contact">
            <div class="contact-info">
                <div class="map-box">
                    <iframe src="https://www.google.com/maps?q=Waikiki+Beach+Honolulu+HI&output=embed" width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"></iframe>
                </div>
                <div class="info-box">
                    <h3 style="color:#00d2ff; margin-bottom:8px; font-size: 1.5rem;">Contact Aloha Vibes</h3>
                    <p>📍 2335 Kalākaua Ave, Honolulu, HI 96815</p>
                    <p>📞 +1 808-123-4567 | 📧 help@alohavibes.com</p>
                </div>
            </div>
        </section>
    </div>

    <script>
        const dot = document.querySelector('.cursor-dot');
        const outline = document.querySelector('.cursor-outline');
        const overlay = document.getElementById('menuOverlay');
        const container = document.getElementById('mainContainer');
        const startDate = document.getElementById('startDate');
        const endDate = document.getElementById('endDate');
        const sections = document.querySelectorAll('section');
        const dots = document.querySelectorAll('.dot');

        // 1. 마우스 애니메이션 (반응성 강화)
        window.addEventListener('mousemove', (e) => {
            const x = e.clientX;
            const y = e.clientY;
            
            dot.style.left = x + 'px';
            dot.style.top = y + 'px';

            outline.animate({
                left: x + 'px',
                top: y + 'px'
            }, { duration: 250, fill: "forwards" });
        });

        // 호버 대상들 커서 효과
        const hoverItems = document.querySelectorAll('button, a, input, select, .dot');
        hoverItems.forEach(item => {
            item.addEventListener('mouseenter', () => outline.classList.add('hover'));
            item.addEventListener('mouseleave', () => outline.classList.remove('hover'));
        });

        // 2. 달력 자동화 (첫 번째 선택 시 두 번째 자동 팝업)
        startDate.addEventListener('change', () => {
            endDate.min = startDate.value; // 귀국일 최소값을 출발일로 제한
            endDate.focus();
            if ('showPicker' in HTMLInputElement.prototype) {
                try { endDate.showPicker(); } catch (e) { console.log(e); }
            }
        });

        // 3. 메뉴 및 섹션 이동 기능
        function toggleMenu() { overlay.classList.toggle('open'); }
        function goToSection(idx) {
            sections[idx].scrollIntoView({ behavior: 'smooth' });
            overlay.classList.remove('open');
        }

        // 4. 스크롤 위치 감지 (왼쪽 인디케이터 업데이트)
        container.addEventListener('scroll', () => {
            let current = 0;
            sections.forEach((section, index) => {
                if (container.scrollTop >= section.offsetTop - 100) current = index;
            });
            dots.forEach((dot, index) => dot.classList.toggle('active', index === current));
        });
    </script>
</body>
</html>
