<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ALOHA VIBES - 하와이 전문 여행사</title>
    
    <!-- 라이브러리 (달력 & 이메일) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" type="text/css" href="https://npmcdn.com/flatpickr/dist/themes/dark.css">
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ko.js"></script>

    <style>
        /* 1. 기본 스타일 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        @media (pointer: coarse) { .cursor-dot, .cursor-outline { display: none !important; } * { cursor: auto !important; } }
        @media (pointer: fine) { * { cursor: none !important; } .cursor-dot, .cursor-outline { display: block; } }
        html, body { height: 100%; overflow: hidden; font-family: 'Pretendard', sans-serif; background-color: #000; color: #fff; }
        
        /* 2. 마우스 커서 (PC 전용) */
        .cursor-dot { width: 8px; height: 8px; background: #00d2ff; border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 1000000; transform: translate(-50%, -50%); }
        .cursor-outline { width: 30px; height: 30px; border: 2px solid rgba(0, 210, 255, 0.5); border-radius: 50%; position: fixed; top: 0; left: 0; pointer-events: none; z-index: 999999; transform: translate(-50%, -50%); }
        .cursor-outline.hover { width: 60px; height: 60px; background: rgba(0, 210, 255, 0.1); border-color: #00d2ff; }
        .flatpickr-calendar { z-index: 99999 !important; }

        /* 3. 레이아웃 */
        .container { height: 100dvh; overflow-y: scroll; scroll-snap-type: y mandatory; scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        section { height: 100dvh; width: 100%; scroll-snap-align: start; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; background-size: cover; background-position: center; text-align: center; padding: 0 10%; }

        /* 배경 이미지 */
        #home { background-image: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)), url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=1600'); }
        #tours { background-image: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), url('https://images.unsplash.com/photo-1542259005453-d93f3b203d98?w=1600'); }
        #booking { background-image: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1544551763-46a013bb70d5?w=1600'); }
        #check { background-image: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url('https://images.unsplash.com/photo-1503756234508-e32369269deb?w=1600'); }
        #contact { background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1505881502353-a1986add3732?w=1600'); }

        /* 4. UI 요소 */
        .indicator { position: fixed; left: 20px; top: 50%; transform: translateY(-50%); z-index: 1000; display: flex; flex-direction: column; gap: 15px; }
        .dot { width: 12px; height: 12px; border: 1px solid #fff; background: rgba(255,255,255,0.2); transition: 0.3s; }
        .dot.active { background: #00d2ff; border-color: #00d2ff; transform: scale(1.3); }

        .menu-toggle { position: fixed; top: 20px; right: 20px; z-index: 1001; width: 50px; height: 50px; background: #00d2ff; color: white; border: none; font-size: 30px; border-radius: 5px; }
        .menu-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; display: flex; flex-direction: column; justify-content: center; align-items: center; opacity: 0; visibility: hidden; transition: 0.4s ease; }
        .menu-overlay.open { opacity: 1; visibility: visible; }
        .menu-link { font-size: 2rem; font-weight: 800; color: #fff; text-decoration: none; letter-spacing: 3px; margin: 15px 0; }

        /* 5. 폼 스타일 */
        .form-card { background: white; color: #333; padding: 25px; border-radius: 20px; width: 100%; max-width: 420px; display: flex; flex-direction: column; gap: 12px; }
        .form-card input, .form-card select { padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 100%; font-size: 16px; font-family: inherit; }
        .action-btn { background: #00d2ff; border: none; padding: 12px; color: white; border-radius: 8px; font-weight: bold; font-size: 16px; margin-top: 5px; }

        /* 결과창 */
        #resultArea { margin-top: 15px; padding: 15px; background: #f0faff; border-radius: 10px; border-left: 5px solid #00d2ff; display: none; text-align: left; }
        #resultArea h4 { color: #007fa3; margin-bottom: 5px; }

        @media (max-width: 768px) { section { padding: 0 40px; } h1 { font-size: 2.5rem !important; } .menu-link { font-size: 1.5rem; } }
    </style>
</head>
<body>

    <div class="cursor-dot"></div>
    <div class="cursor-outline"></div>

    <button class="menu-toggle" onclick="toggleMenu()">≡</button>
    <div class="menu-overlay" id="menuOverlay">
        <a href="javascript:void(0)" class="menu-link" onclick="goToSection(0)">HOME</a>
        <a href="javascript:void(0)" class="menu-link" onclick="goToSection(1)">TOURS</a>
        <a href="javascript:void(0)" class="menu-link" onclick="goToSection(2)">BOOKING</a>
        <a href="javascript:void(0)" class="menu-link" onclick="goToSection(3)">CHECK</a>
        <a href="javascript:void(0)" class="menu-link" onclick="goToSection(4)">LOCATION</a>
    </div>

    <div class="indicator">
        <div class="dot active" onclick="goToSection(0)"></div>
        <div class="dot" onclick="goToSection(1)"></div>
        <div class="dot" onclick="goToSection(2)"></div>
        <div class="dot" onclick="goToSection(3)"></div>
        <div class="dot" onclick="goToSection(4)"></div>
    </div>

    <div class="container" id="mainContainer">
        <!-- 1. HOME -->
        <section id="home"><h1>ALOHA VIBES</h1><p>하와이의 푸른 꿈, 현실이 되는 곳</p></section>
        
        <!-- 2. TOURS -->
        <section id="tours">
            <h2>Premium Tours</h2>
            <div style="display:grid; grid-template-columns: repeat(2, 1fr); gap:10px; margin-top:20px; width:100%; max-width:800px;">
                <div style="background:rgba(255,255,255,0.1); padding:15px; border-radius:10px;"><h3>오아후 투어</h3><p>$149</p></div>
                <div style="background:rgba(255,255,255,0.1); padding:15px; border-radius:10px;"><h3>헬기 투어</h3><p>$320</p></div>
                <div style="background:rgba(255,255,255,0.1); padding:15px; border-radius:10px;"><h3>스노클링</h3><p>$85</p></div>
                <div style="background:rgba(255,255,255,0.1); padding:15px; border-radius:10px;"><h3>스카이다이빙</h3><p>$250</p></div>
            </div>
        </section>

        <!-- 3. BOOKING (이메일 전송 부분 핵심 수정) -->
        <section id="booking">
            <h2 style="margin-bottom: 20px;">Booking Request</h2>
            <!-- [중요] 아래 action 주소에 Formspree에서 만든 주소를 꼭 넣어주세요! -->
            <form action="https://formspree.io/f/xojpdaqq" method="POST" class="form-card" id="resForm">
                <input type="text" name="name" id="book_name" placeholder="성함" required>
                <!-- 연락처 자동 하이픈 적용 -->
                <input type="tel" name="phone" id="book_phone" placeholder="연락처 (010-0000-0000)" maxlength="13" required>
                <input type="email" name="email" id="book_email" placeholder="이메일" required>
                <input type="text" id="rangeDate" name="dates" placeholder="일정 선택" readonly required>
                <select name="product" id="book_product" required>
                    <option value="">상품 선택</option>
                    <option>오아후 섬 일주</option><option>섬 전체 헬기 투어</option>
                    <option>하나우마베이 스노클링</option><option>하와이 스카이다이빙</option>
                </select>
                <button type="submit" class="action-btn" id="submitBtn">예약 신청 완료</button>
            </form>
        </section>

        <!-- 4. CHECK (예약 확인) -->
        <section id="check">
            <h2 style="margin-bottom: 20px;">Check Reservation</h2>
            <div class="form-card">
                <input type="text" id="check_name" placeholder="성함">
                <input type="tel" id="check_phone" placeholder="연락처 (하이픈 포함)" maxlength="13">
                <button type="button" class="action-btn" onclick="lookupReservation()">조회하기</button>
                <div id="resultArea">
                    <h4 id="res_title">조회 완료</h4>
                    <p id="res_product"></p>
                    <p id="res_date"></p>
                </div>
            </div>
        </section>

        <!-- 5. LOCATION -->
        <section id="contact">
            <div class="form-card" style="background:none; color:white;">
                <div class="map-box"><iframe src="https://www.google.com/maps?q=Waikiki+Beach&output=embed" width="100%" height="100%" style="border:0;"></iframe></div>
                <p style="margin-top:15px;">📍 2335 Kalākaua Ave, Honolulu, HI</p>
                <p>📞 +1 808-123-4567 | 📧 jangyh89@gmail.com</p>
            </div>
        </section>
    </div>

    <script>
        const dot = document.querySelector('.cursor-dot');
        const outline = document.querySelector('.cursor-outline');
        const container = document.getElementById('mainContainer');
        const resForm = document.getElementById('resForm');
        const bookPhone = document.getElementById('book_phone');
        const checkPhone = document.getElementById('check_phone');

        // [기능 1] 연락처 자동 하이픈 생성 함수
        const handlePhoneInput = (e) => {
            let value = e.target.value.replace(/[^0-9]/g, "");
            let result = "";
            if (value.length < 4) result = value;
            else if (value.length < 8) result = value.substr(0, 3) + "-" + value.substr(3);
            else result = value.substr(0, 3) + "-" + value.substr(3, 4) + "-" + value.substr(7);
            e.target.value = result;
        };
        bookPhone.addEventListener('input', handlePhoneInput);
        checkPhone.addEventListener('input', handlePhoneInput);

        // [기능 2] 달력 설정
        flatpickr("#rangeDate", {
            mode: "range", locale: "ko", dateFormat: "y.m.d", minDate: "today", disableMobile: "true",
            onClose: function(selectedDates, dateStr, instance) {
                if (selectedDates.length === 2) {
                    const diffDays = Math.ceil(Math.abs(selectedDates[1] - selectedDates[0]) / (1000 * 60 * 60 * 24)) + 1;
                    instance.input.value = `${instance.formatDate(selectedDates[0], "y.m.d")} ~ ${instance.formatDate(selectedDates[1], "y.m.d")} (${diffDays}일)`;
                }
            }
        });

        // [기능 3] 이메일 전송 및 로컬 저장
        resForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const url = this.action;
            
            // [검증] ID가 입력되지 않았을 때 안내
            if (url.includes("여기에_ID_넣으세요")) {
                alert("Formspree ID가 입력되지 않았습니다. 코드를 확인해주세요.");
                return;
            }

            btn.innerText = "전송 중...";
            const formData = new FormData(this);
            const bookingData = {
                name: document.getElementById('book_name').value,
                phone: document.getElementById('book_phone').value,
                dates: document.getElementById('rangeDate').value,
                product: document.getElementById('book_product').value
            };

            try {
                const response = await fetch(url, { 
                    method: 'POST', 
                    body: formData, 
                    headers: { 'Accept': 'application/json' } 
                });
                
                if (response.ok) {
                    // 데이터 저장 (전화번호를 고유 키로)
                    localStorage.setItem('aloha_res_' + bookingData.phone, JSON.stringify(bookingData));
                    alert("알로하! 예약 신청이 성공적으로 발송되었습니다.\n담당자가 확인 후 답변 드리겠습니다.");
                    resForm.reset();
                } else {
                    alert("전송에 실패했습니다. Formspree 설정을 확인해주세요.");
                }
            } catch (err) {
                alert("네트워크 오류가 발생했습니다.");
            } finally {
                btn.innerText = "예약 신청 완료";
            }
        });

        // [기능 4] 예약 조회
        function lookupReservation() {
            const name = document.getElementById('check_name').value;
            const phone = document.getElementById('check_phone').value;
            const resultArea = document.getElementById('resultArea');
            const savedData = localStorage.getItem('aloha_res_' + phone);

            if (savedData) {
                const data = JSON.parse(savedData);
                if (data.name === name) {
                    document.getElementById('res_product').innerText = "📦 상품: " + data.product;
                    document.getElementById('res_date').innerText = "📅 일정: " + data.dates;
                    resultArea.style.display = "block";
                } else { alert("정보가 일치하지 않습니다."); }
            } else { alert("예약 내역을 찾을 수 없습니다."); }
        }

        // [기능 5] 마우스/메뉴/스크롤
        const isTouch = window.matchMedia("(pointer: coarse)").matches;
        if (!isTouch) {
            window.addEventListener('mousemove', (e) => {
                dot.style.left = e.clientX + 'px'; dot.style.top = e.clientY + 'px';
                outline.animate({ left: e.clientX + 'px', top: e.clientY + 'px' }, { duration: 250, fill: "forwards" });
            });
        }
        function toggleMenu() { document.getElementById('menuOverlay').classList.toggle('open'); }
        function goToSection(idx) { document.querySelectorAll('section')[idx].scrollIntoView({ behavior: 'smooth' }); document.getElementById('menuOverlay').classList.remove('open'); }
        container.addEventListener('scroll', () => {
            let current = 0;
            document.querySelectorAll('section').forEach((sec, i) => { if (container.scrollTop >= sec.offsetTop - 50) current = i; });
            document.querySelectorAll('.dot').forEach((d, i) => d.classList.toggle('active', i === current));
        });
    </script>
</body>
</html>
